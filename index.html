<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Clock</title>
    <link id="manifest-link" rel="manifest" href="">
    <style>
        /* CSS-Reset und Basis-Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
            transition: color 0.3s ease;
        }

        #clock {
            font-size: 15vw; 
            font-weight: bold;
            font-variant-numeric: tabular-nums; 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            user-select: none; 
            text-align: center;
            will-change: transform, filter; 
            /* Margins entfernt, damit align-items funktioniert */
            margin: 0;
        }

        /* --- UI für Einstellungen --- */
        #settings-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #ffffff;
            opacity: 0.3;
            cursor: pointer;
            transition: opacity 0.2s;
            z-index: 10;
        }

        #settings-btn:hover {
            opacity: 1;
        }

        #settings-modal {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 20;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .settings-content {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 90%;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto; 
        }

        .settings-content h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
        }

        .setting-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .setting-group label {
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .setting-group input, .setting-group select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #050505;
            color: #fff;
            font-size: 1rem;
        }

        .setting-group input[type="color"] {
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }

        #close-settings {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        #close-settings:hover {
            background-color: #555;
        }

        /* --- Animationen für den Zeitgeber --- */
        @keyframes effectPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes effectShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px); }
            40%, 80% { transform: translateX(15px); }
        }

        @keyframes effectFlash {
            0%, 100% { filter: hue-rotate(0deg) brightness(1); }
            50% { filter: hue-rotate(180deg) brightness(2); }
        }

        .effect-pulse { animation: effectPulse 0.8s ease-in-out; }
        .effect-shake { animation: effectShake 0.6s ease-in-out; }
        .effect-flash { animation: effectFlash 0.8s ease-in-out; }

    </style>
        <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- Settings Button -->
    <button id="settings-btn" aria-label="Einstellungen öffnen">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <!-- Einstellungen Modal -->
    <div id="settings-modal">
        <div class="settings-content">
            <h2>Einstellungen</h2>
            
            <div class="setting-group">
                <label for="color-picker">Schriftfarbe</label>
                <input type="color" id="color-picker" value="#ffffff">
            </div>

            <div class="setting-group">
                <label for="font-picker">Schriftart</label>
                <select id="font-picker">
                    <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">System Standard</option>
                    <option value="'Courier New', Courier, monospace">Monospace</option>
                    <option value="Georgia, serif">Serif</option>
                    <option value="'Comic Sans MS', cursive, sans-serif">Cursive</option>
                    <option value="Impact, fantasy">Impact</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="position-picker">Position</label>
                <select id="position-picker">
                    <option value="center">Mittig</option>
                    <option value="flex-start">Oben</option>
                    <option value="flex-end">Unten</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="format-picker">Zeitformat</label>
                <select id="format-picker">
                    <option value="HH:MM:SS">HH:MM:SS (24h)</option>
                    <option value="HH:MM">HH:MM (24h Kurz)</option>
                    <option value="hh:mm:ss A">hh:mm:ss AM/PM (12h)</option>
                    <option value="DD.MM.YYYY HH:MM:SS">DD.MM.YYYY HH:MM:SS (Mit Datum)</option>
                    <option value="YYYY-MM-DD HH:MM:SS">YYYY-MM-DD HH:MM:SS (ISO-artig)</option>
                </select>
            </div>

            <div class="setting-group">
                <label for="ticker-interval">Erinnerung alle X Min. (0 = Aus)</label>
                <input type="number" id="ticker-interval" value="0" min="0" max="60">
            </div>

            <div class="setting-group">
                <label for="ticker-effect">Erinnerungs-Effekt</label>
                <select id="ticker-effect">
                    <option value="pulse">Pulsieren (Größer werden)</option>
                    <option value="shake">Wackeln</option>
                    <option value="flash">Farbwechsel (Aufleuchten)</option>
                </select>
            </div>

            <button id="close-settings">Schließen</button>
        </div>
    </div>

    <!-- Anzeige der aktuellen Uhrzeit -->
    <div id="clock">00:00:00</div>

    <script>
        const CACHE_NAME = 'simpleclock-v1';
const ASSETS = [
  '/',
  '/index.html',
  'https://cdn.tailwindcss.com',
  'https://unpkg.com/lucide@latest'
];

self.addEventListener('install', (e) => {
  e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(ASSETS)));
});

self.addEventListener('fetch', (e) => {
  e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
});
        // --- 1. UHR & EINSTELLUNGS LOGIK ---
        
        // Standardwerte
        const defaultState = {
            color: '#ffffff',
            font: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
            format: 'HH:MM:SS',
            tickerInterval: 0,        
            tickerEffect: 'pulse',
            position: 'center'
        };

        // Lade Einstellungen aus LocalStorage, falls vorhanden
        let appState = { ...defaultState };
        try {
            const savedState = localStorage.getItem('miniUhrSettings');
            if (savedState) {
                appState = { ...appState, ...JSON.parse(savedState) };
            }
        } catch (e) {
            console.warn("Einstellungen konnten nicht geladen werden.", e);
        }

        function saveState() {
            localStorage.setItem('miniUhrSettings', JSON.stringify(appState));
        }

        const clockEl = document.getElementById('clock');
        const colorPicker = document.getElementById('color-picker');
        const fontPicker = document.getElementById('font-picker');
        const formatPicker = document.getElementById('format-picker');
        const positionPicker = document.getElementById('position-picker');
        const tickerIntervalInput = document.getElementById('ticker-interval');

        colorPicker.value = appState.color;
        fontPicker.value = appState.font;
        formatPicker.value = appState.format;
        positionPicker.value = appState.position;
        tickerIntervalInput.value = appState.tickerInterval;

        function applyStyles() {
            clockEl.style.color = appState.color;
            document.body.style.fontFamily = appState.font;
            document.body.style.justifyContent = appState.position;
        }

        function formatTime(date, format) {
            const pad = (n) => n.toString().padStart(2, '0');
            const h24 = pad(date.getHours());
            const h12 = pad(date.getHours() % 12 || 12);
            const m = pad(date.getMinutes());
            const s = pad(date.getSeconds());
            const ampm = date.getHours() >= 12 ? 'PM' : 'AM';
            const DD = pad(date.getDate());
            const MM = pad(date.getMonth() + 1); 
            const YYYY = date.getFullYear();

            switch(format) {
                case 'HH:MM': return `${h24}:${m}`;
                case 'hh:mm:ss A': return `${h12}:${m}:${s} ${ampm}`;
                case 'DD.MM.YYYY HH:MM:SS': return `${DD}.${MM}.${YYYY}\n${h24}:${m}:${s}`;
                default: return `${h24}:${m}:${s}`;
            }
        }

        function updateClock() {
            const now = new Date();
            
            // Text & Styles aktualisieren
            clockEl.innerText = formatTime(now, appState.format);
            
            // --- GEÄNDERT in v1.3.1: Absolute Zeitgeber Logik (zur runden Minute) ---

            if (appState.tickerInterval > 0) {
                if (appState.tickerInterval > 0 && now.getSeconds() === 0 && now.getMinutes() % appState.tickerInterval === 0) {
                clockEl.classList.add(`effect-${appState.tickerEffect}`);
                setTimeout(() => clockEl.classList.remove(`effect-${appState.tickerEffect}`), 1000);
            }
        }
    }

        document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('settings-modal').style.display = 'flex');
        document.getElementById('close-settings').addEventListener('click', () => document.getElementById('settings-modal').style.display = 'none');

        colorPicker.addEventListener('input', (e) => { appState.color = e.target.value; saveState(); applyStyles(); });
        fontPicker.addEventListener('change', (e) => { appState.font = e.target.value; saveState(); applyStyles(); });
        positionPicker.addEventListener('change', (e) => { appState.position = e.target.value; saveState(); applyStyles(); });
        formatPicker.addEventListener('change', (e) => { appState.format = e.target.value; saveState(); updateClock(); });
        tickerIntervalInput.addEventListener('input', (e) => { appState.tickerInterval = parseInt(e.target.value, 10) || 0; saveState(); });

        applyStyles();
        updateClock();
        setInterval(updateClock, 1000);

        const iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192"><circle cx="96" cy="96" r="80" fill="#050505" stroke="#ffffff" stroke-width="8"/><path d="M96 35 V96 L140 140" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/></svg>';
        const manifest = { name: "SimpleClock", short_name: "Clock", start_url: location.href, display: "standalone", icons: [{ src: 'data:image/svg+xml;base64,' + btoa(iconSvg), sizes: "192x192", type: "image/svg+xml" }] };
        document.getElementById('manifest-link').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'}));
    </script>
</body>
</html>

<!--
=== CHANGE LOG ===
v1.0.0 (Initial Release)
- Basis HTML, CSS, Uhrzeit, PWA.

v1.1.0 (Settings Update)
- UI Modal, Farbe, Schriftart, Format.

v1.2.0 (Time Ticker Update)
- Zeitgeber mit Animationen (absolut nach runder Minute).

v1.3.0 (Storage & Relative Ticker Update)
- HINZUGEFÜGT: LocalStorage - Alle Einstellungen überleben nun einen Seiten-Neuladen.
- GEÄNDERT: Timer auf relative Berechnung geändert.

v1.3.1 (Absolute Ticker Fix)
- GEÄNDERT: Logik des Timers wieder auf absolute Intervalle zur vollen Stunde umgestellt (z. B. 15:00, 15:05, 15:10), wie vom Nutzer explizit gewünscht.
- ENTFERNT: `nextTickTime` Hilfsvariable wurde restlos aus State und Speicher entfernt.
-->
